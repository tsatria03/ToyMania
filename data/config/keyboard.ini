# NVGT keyboard bindings
# Format: action=KEY  or  action=MOD+KEY  or  action=MOD+KEY:trigger

[buffer]

buffer_previous=COMMA:repeat
buffer_next=PERIOD:repeat
buffer_top=LSHIFT+COMMA:repeat,RSHIFT+COMMA:repeat
buffer_bottom=LSHIFT+PERIOD:repeat,RSHIFT+PERIOD:repeat
buffer_prev_category=LBRACKET:repeat
buffer_next_category=RBRACKET:repeat
buffer_toggle=LSHIFT+M:repeat,RSHIFT+M:repeat
buffer_copy=LSHIFT+C:repeat,RSHIFT+C:repeat
buffer_export=LSHIFT+BACKSLASH:repeat,RSHIFT+BACKSLASH:repeat

[facing]

face_left=LSHIFT+LEFT,RSHIFT+LEFT
face_right=LSHIFT+RIGHT,RSHIFT+RIGHT
face_backward=LSHIFT+DOWN,RSHIFT+DOWN
face_forward=LSHIFT+UP,RSHIFT+UP

[movement]

move_up=UP
move_down=DOWN
move_left=LEFT
move_right=RIGHT
move_up_held=UP:down
move_down_held=DOWN:down
move_left_held=LEFT:down
move_right_held=RIGHT:down
run_modifier=LALT:down,RALT:down,LCTRL:down,RCTRL:down

[combat]

fire=SPACE
fire_held=SPACE:down
reload=R

[weapons]

weapon_bat=1
weapon_boot=2
weapon_club=3
weapon_feat=4
weapon_fist=5
weapon_hammer=6
weapon_knife=7
weapon_laser=8
weapon_machine_gun=9
weapon_pistol=0
def_weapon_feat=1
def_weapon_fist=2

[inventory]

inventory_open=I:repeat
inventory_cycle=TAB:repeat
item_use=LSHIFT+RETURN:repeat,RSHIFT+RETURN:repeat

[info]

info_level=L
info_health=H
info_money=M
info_time=Y
info_coords=C
info_steps=X
info_weapons=W
info_ammo=Z
info_keys_field=U
info_toys_field=O
info_enemies_field=E
info_cars_field=J
info_store_or_shop=S
info_collected_keys=K
info_collected_toys=T
info_killed_enemies=Q
info_destroyed_cars=F
info_door=D:repeat

[volume]

music_vol_up=PAGEUP:repeat
music_vol_down=PAGEDOWN:repeat
ambient_vol_up=HOME:repeat
ambient_vol_down=END:repeat
alarm_vol_up=LSHIFT+PAGEUP:repeat,RSHIFT+PAGEUP:repeat
alarm_vol_down=LSHIFT+PAGEDOWN:repeat,RSHIFT+PAGEDOWN:repeat
heart_vol_up=LSHIFT+HOME:repeat,RSHIFT+HOME:repeat
heart_vol_down=LSHIFT+END:repeat,RSHIFT+END:repeat

[misc]

pause=P:repeat
quit=ESCAPE:repeat
open_audio_sets_menu=LALT+A,RALT+A
open_game_sets_menu=LALT+G,RALT+G
open_keyboard_sets_menu=LALT+K,RALT+K
open_speech_sets_menu=LALT+S,RALT+S
open_rec_menu=LALT+R,RALT+R
